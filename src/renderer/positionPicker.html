<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
    <title>Move overlay</title>
    <link rel="stylesheet" href="positionPicker.css" />
  </head>
  <body>
    <p class="hint">Click where you want the overlay</p>
    <div id="grid">
      <button class="cell" data-anchor="top-left" title="Top-left"></button>
      <button class="cell" data-anchor="top-center" title="Top-center"></button>
      <button class="cell" data-anchor="top-right" title="Top-right"></button>
      <button class="cell" data-anchor="middle-left" title="Middle-left"></button>
      <button class="cell" data-anchor="middle-center" title="Middle-center"></button>
      <button class="cell" data-anchor="middle-right" title="Middle-right"></button>
      <button class="cell" data-anchor="bottom-left" title="Bottom-left"></button>
      <button class="cell" data-anchor="bottom-center" title="Bottom-center"></button>
      <button class="cell" data-anchor="bottom-right" title="Bottom-right"></button>
    </div>
    <script src="positionPicker.js"></script>
  </body>
</html>
